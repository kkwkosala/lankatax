name: PR Validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  code-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run AI Code Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: python scripts/review_code.py

  architecture-review:
    name: Architecture Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Architecture Review
        run: python scripts/review_architecture.py

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Security Scan
        run: python scripts/security_scan.py

  angular-lint:
    name: Angular Lint
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.title, '[FE]') || contains(github.event.pull_request.title, '[FULL]')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        continue-on-error: true

      - name: Run lint
        run: npx ng lint
        continue-on-error: true

  angular-build:
    name: Angular Build
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.title, '[FE]') || contains(github.event.pull_request.title, '[FULL]')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        continue-on-error: true

      - name: Build
        run: npx ng build --configuration=production
        continue-on-error: true

  angular-test:
    name: Angular Tests
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.title, '[FE]') || contains(github.event.pull_request.title, '[FULL]')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        continue-on-error: true

      - name: Run tests
        run: npx ng test --watch=false --browsers=ChromeHeadless
        continue-on-error: true

  edge-function-test:
    name: Edge Function Tests
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.title, '[BE]') || contains(github.event.pull_request.title, '[FULL]')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Run Edge Function tests
        run: |
          if [ -d "supabase/functions" ]; then
            find supabase/functions -name "*_test.ts" -o -name "*.test.ts" | \
            xargs -I {} deno test {} --allow-all
          fi
        continue-on-error: true
